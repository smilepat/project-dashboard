name: CI

# parse.ts 등 핵심 로직이 회귀하지 않도록 push/PR마다
# 단위 테스트와 타입 검사를 자동 실행한다.
on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Type check
        run: npx tsc --noEmit
